<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Task Analytics Dashboard</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --success: #4ade80;
            --danger: #f87171;
            
            /* Category Colors */
            --cat-work: #c084fc;
            --cat-personal: #fb923c;
            --cat-urgent: #f87171;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .dashboard {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 650px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Analytics Section */
        .analytics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .analytics-header h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            gap: 15px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }

        .stat-val {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Control Panel Form */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .meta-row {
            display: flex;
            gap: 10px;
        }

        input[type="text"], input[type="date"], select {
            background: #0f172a;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="text"] { flex: 1; }
        .meta-row select, .meta-row input[type="date"] { flex: 1; }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.15);
        }

        .btn-primary {
            background: var(--primary);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-primary:hover { background: var(--primary-hover); }

        /* Filtering System */
        .filter-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .filter-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .filter-chip.active, .filter-chip:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Task Items */
        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 380px;
            overflow-y: auto;
        }

        .task-item {
            background: #141f32;
            border-left: 4px solid var(--primary);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-item.work { border-left-color: var(--cat-work); }
        .task-item.personal { border-left-color: var(--cat-personal); }
        .task-item.urgent { border-left-color: var(--cat-urgent); }

        .task-item.completed {
            border-left-color: var(--border);
            opacity: 0.4;
        }
        .task-item.completed .task-title { text-decoration: line-through; }

        .task-info-block {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            cursor: pointer;
        }

        .task-title {
            font-size: 15px;
            font-weight: 500;
            word-break: break-all;
        }

        .task-meta-tags {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 11px;
            color: var(--text-muted);
        }

        .badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
        }
        .badge.work { background: rgba(192, 132, 252, 0.15); color: var(--cat-work); }
        .badge.personal { background: rgba(251, 146, 60, 0.15); color: var(--cat-personal); }
        .badge.urgent { background: rgba(248, 113, 113, 0.15); color: var(--cat-urgent); }

        .date-alert.overdue {
            color: var(--danger);
            font-weight: bold;
        }

        .delete-icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .delete-icon-btn:hover {
            color: var(--danger);
            background: rgba(248, 113, 113, 0.1);
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <!-- Live Analytics Node -->
        <div class="analytics-header">
            <div>
                <h2>Task Engine v2.0</h2>
                <div style="font-size: 12px; color: var(--text-muted);" id="progressText">0% Complete</div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-val" id="totalCount">0</div><div class="stat-label">Total</div></div>
                <div class="stat-card"><div class="stat-val" id="pendingCount" style="color: var(--cat-personal)">0</div><div class="stat-label">Pending</div></div>
                <div class="stat-card"><div class="stat-val" id="completedCount" style="color: var(--success)">0</div><div class="stat-label">Done</div></div>
            </div>
        </div>

        <!-- Inputs Framework -->
        <div class="control-panel">
            <div class="input-row">
                <input type="text" id="taskInput" placeholder="Define objective string..." autocomplete="off">
                <button class="btn-primary" id="addBtn">Commit Task</button>
            </div>
            <div class="meta-row">
                <select id="categorySelect">
                    <option value="work">🛠️ Work / Coding</option>
                    <option value="personal">🏠 Personal / Labs</option>
                    <option value="urgent">🚨 Critical Priority</option>
                </select>
                <input type="date" id="dateInput">
            </div>
            <input type="text" id="searchInput" placeholder="🔍 Live query search string..." style="padding: 10px 14px; font-size: 13px;">
        </div>

        <!-- Filter Directives Matrix -->
        <div class="filter-bar" id="filterBar">
            <span class="filter-chip active" data-filter="all">All Modules</span>
            <span class="filter-chip" data-filter="work">Work Only</span>
            <span class="filter-chip" data-filter="personal">Personal</span>
            <span class="filter-chip" data-filter="urgent">Critical</span>
            <span class="filter-chip" data-filter="completed">Completed</span>
        </div>

        <!-- Reactive DOM Target -->
        <ul class="task-list" id="taskList"></ul>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const taskInput = document.getElementById('taskInput');
            const categorySelect = document.getElementById('categorySelect');
            const dateInput = document.getElementById('dateInput');
            const searchInput = document.getElementById('searchInput');
            const addBtn = document.getElementById('addBtn');
            const taskList = document.getElementById('taskList');
            const filterBar = document.getElementById('filterBar');

            let tasksArray = JSON.parse(localStorage.getItem('engineTasks')) || [];
            let activeFilter = 'all';

            // Set default date picker target to today
            dateInput.value = new Date().toISOString().split('T')[0];

            function calculateMetrics() {
                const total = tasksArray.length;
                const completed = tasksArray.filter(t => t.completed).length;
                const pending = total - completed;
                const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;

                document.getElementById('totalCount').innerText = total;
                document.getElementById('completedCount').innerText = completed;
                document.getElementById('pendingCount').innerText = pending;
                document.getElementById('progressText').innerText = `${percentage}% System Objectives Cleared`;
            }

            function renderEngine() {
                calculateMetrics();
                taskList.innerHTML = '';

                const searchQuery = searchInput.value.toLowerCase().trim();

                // Compute filtering pipelines
                let filtered = tasksArray.filter(task => {
                    const matchesSearch = task.text.toLowerCase().includes(searchQuery);
                    
                    if (!matchesSearch) return false;
                    if (activeFilter === 'all') return true;
                    if (activeFilter === 'completed') return task.completed;
                    return task.category === activeFilter;
                });

                if (filtered.length === 0) {
                    taskList.innerHTML = `<div style="text-align:center; padding: 30px; color: var(--text-muted); font-size: 14px;">No active records meet filter schema criteria.</div>`;
                    return;
                }

                filtered.forEach(task => {
                    const li = document.createElement('li');
                    li.className = `task-item ${task.category} ${task.completed ? 'completed' : ''}`;
                    
                    // Date Parsing logic for deadlines
                    const todayStr = new Date().toISOString().split('T')[0];
                    const isOverdue = !task.completed && task.dueDate && task.dueDate < todayStr;
                    const dateDisplay = task.dueDate ? `📅 Due: ${task.dueDate}` : 'No Deadline';

                    li.innerHTML = `
                        <div class="task-info-block" onclick="toggleTaskStatus('${task.id}')">
                            <span class="task-title">${task.text}</span>
                            <div class="task-meta-tags">
                                <span class="badge ${task.category}">${task.category}</span>
                                <span class="date-alert ${isOverdue ? 'overdue' : ''}">
                                    ${isOverdue ? '⚠️ Overdue: ' + task.dueDate : dateDisplay}
                                </span>
                            </div>
                        </div>
                        <button class="delete-icon-btn" onclick="destroyTask('${task.id}')" title="Terminate Task Object">
                            ✕
                        </button>
                    `;
                    taskList.appendChild(li);
                });

                localStorage.setItem('engineTasks', JSON.stringify(tasksArray));
            }

            function triggerTaskAddition() {
                const textVal = taskInput.value.trim();
                if (!textVal) return;

                const taskObject = {
                    id: 'task_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
                    text: textVal,
                    category: categorySelect.value,
                    dueDate: dateInput.value,
                    completed: false,
                    timestamp: new Date().toLocaleString()
                };

                tasksArray.push(taskObject);
                taskInput.value = '';
                renderEngine();
            }

            // Globalized handlers bound dynamically via IDs instead of array indexes to protect mutated lookups
            window.toggleTaskStatus = function(id) {
                const target = tasksArray.find(t => t.id === id);
                if (target) target.completed = !target.completed;
                renderEngine();
            }

            window.destroyTask = function(id) {
                tasksArray = tasksArray.filter(t => t.id !== id);
                renderEngine();
            }

            // Input Observers
            addBtn.addEventListener('click', triggerTaskAddition);
            taskInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') triggerTaskAddition(); });
            searchInput.addEventListener('input', renderEngine);

            // Filter Control Delegator
            filterBar.addEventListener('click', (e) => {
                if (!e.target.classList.contains('filter-chip')) return;
                
                document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
                e.target.classList.add('active');
                
                activeFilter = e.target.getAttribute('data-filter');
                renderEngine();
            });

            renderEngine();
        });
    </script>
</body>
</html>
