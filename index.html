<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Task Manager</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --danger-color: #e74c3c;
            --success-color: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .todo-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
            text-align: center;
            color: #2c3e50;
        }

        .input-group {
            display: flex;
            margin-top: 20px;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button {
            padding: 12px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #357abd;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 25px;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary-color);
            transition: all 0.3s ease;
        }

        li.completed {
            border-left-color: var(--success-color);
            opacity: 0.6;
        }

        li.completed span {
            text-decoration: line-through;
        }

        .task-text {
            flex: 1;
            margin-right: 10px;
            cursor: pointer;
            word-break: break-all;
        }

        .delete-btn {
            background-color: transparent;
            color: var(--danger-color);
            border: none;
            padding: 5px 10px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.3s ease;
        }

        .delete-btn:hover {
            background-color: rgba(231, 76, 60, 0.1);
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h2>My Tasks</h2>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new task..." autocomplete="off">
            <button id="addBtn">Add</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const taskInput = document.getElementById('taskInput');
            const addBtn = document.getElementById('addBtn');
            const taskList = document.getElementById('taskList');

            // 1. Load tasks from LocalStorage on page load
            let savedTasks = JSON.parse(localStorage.getItem('tasks')) || [];
            
            function renderTasks() {
                taskList.innerHTML = '';
                savedTasks.forEach((task, index) => {
                    const li = document.createElement('li');
                    if (task.completed) li.classList.add('completed');

                    li.innerHTML = `
                        <span class="task-text" onclick="toggleTask(${index})">${task.text}</span>
                        <button class="delete-btn" onclick="deleteTask(${index})">Delete</button>
                    `;
                    taskList.appendChild(li);
                });
                // Save updated array to localStorage
                localStorage.setItem('tasks', JSON.stringify(savedTasks));
            }

            // 2. Add Task Function
            function addTask() {
                const taskValue = taskInput.value.trim();
                if (taskValue === '') return;

                savedTasks.push({ text: taskValue, completed: false });
                taskInput.value = '';
                renderTasks();
            }

            // Event Listeners for adding tasks
            addBtn.addEventListener('click', addTask);
            taskInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });

            // 3. Toggle Complete Function
            window.toggleTask = function(index) {
                savedTasks[index].completed = !savedTasks[index].completed;
                renderTasks();
            }

            // 4. Delete Task Function
            window.deleteTask = function(index) {
                savedTasks.splice(index, 1);
                renderTasks();
            }

            // Initial render
            renderTasks();
        });
    </script>
</body>
</html>
